kind = "web"
previewPath = "/"
title = "JobConnect AI"
version = "1.0.0"
id = "artifacts/jobconnect-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24826

[services.development]
run = "pnpm --filter @workspace/jobconnect-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jobconnect-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/jobconnect-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24826"
BASE_PATH = "/"
